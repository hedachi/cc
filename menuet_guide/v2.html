<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Kaku Gothic ProN',sans-serif;background:#08080c;color:#e0e0e0;overflow-x:hidden}

/* Fixed top player */
.player-bar{
  position:sticky;top:0;z-index:20;
  background:#101018;
  border-bottom:1px solid #1a1a24;
  padding:8px 12px;
}
.player-row{display:flex;align-items:center;gap:10px}
.play-btn{
  width:44px;height:44px;border-radius:50%;border:none;
  background:#e07040;color:#fff;font-size:18px;cursor:pointer;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
}
.play-btn:active{transform:scale(0.95)}
.player-info{flex:1;min-width:0}
.player-title{font-size:14px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-time{font-size:12px;color:#666;font-variant-numeric:tabular-nums}
.progress{height:24px;background:#16161e;border-radius:4px;position:relative;cursor:pointer;margin-top:6px;overflow:hidden}
.progress-sections{position:absolute;inset:0;display:flex;pointer-events:none}
.progress-sections div{height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(255,255,255,0.4)}
.progress-head{position:absolute;top:0;left:0;width:2px;height:100%;background:#fff;box-shadow:0 0 4px #fff;pointer-events:none}

/* Piano roll - shows currently sounding notes */
.piano-roll{
  height:60px;
  background:#0c0c14;
  border-bottom:1px solid #1a1a24;
  position:sticky;top:86px;z-index:15;
  overflow:hidden;
}
.piano-roll canvas{display:block;width:100%;height:100%}

/* Note name display */
.note-names{
  position:sticky;top:146px;z-index:14;
  background:#101018;
  border-bottom:1px solid #1a1a24;
  padding:6px 12px;
  font-family:'SF Mono','Fira Code',monospace;
  font-size:13px;
  min-height:32px;
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}
.note-pill{
  display:inline-block;
  padding:1px 7px;
  border-radius:8px;
  font-size:12px;
  animation:fadeIn 0.15s;
}
@keyframes fadeIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
.note-pill.high{background:rgba(240,192,96,0.25);color:#f0c060}
.note-pill.mid{background:rgba(160,200,240,0.2);color:#a0c8f0}
.note-pill.low{background:rgba(96,192,128,0.2);color:#60c080}

.stream{padding:8px 12px 120px}
.ann{
  padding:10px 12px;
  margin:4px 0;
  border-radius:8px;
  border-left:3px solid #333;
  background:#12121a;
  opacity:0.25;
  transition:all 0.3s;
  cursor:pointer;
}
.ann.active{opacity:1;background:#18182a}
.ann.past{opacity:0.45}
.ann-time{font-size:10px;color:#555;margin-bottom:2px;font-variant-numeric:tabular-nums}
.ann-text{font-size:14px;color:#ccc;line-height:1.6}
.ann-tags{margin-top:4px}
.ann-tag{

  padding:1px 6px;border-radius:8px;margin:1px 3px 1px 0;

<script>
const audio=document.getElementById('audio'),playBtn=document.getElementById('playBtn'),
  timeEl=document.getElementById('timeEl'),progHead=document.getElementById('progHead'),
  noteNamesEl=document.getElementById('noteNames'),streamEl=document.getElementById('stream');

function toggle(){if(audio.paused){audio.play();playBtn.textContent='⏸'}else{audio.pause();playBtn.textContent='▶'}}
function seek(e){const r=document.getElementById('prog').getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*(audio.duration||489);if(audio.paused)toggle()}
function fmt(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')}

// Note data loaded from JSON
let allNotes=[];
fetch('menuet_notes.json').then(r=>r.json()).then(d=>{allNotes=d});

// Piano roll canvas
const canvas=document.getElementById('rollCanvas'),ctx=canvas.getContext('2d');
function resizeCanvas(){canvas.width=canvas.offsetWidth*2;canvas.height=canvas.offsetHeight*2;ctx.scale(2,2)}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

const NOTE_COLORS={
  'C':'#e06060','C#':'#e08040','D':'#e0a030','D#':'#c0b030',
  'E':'#80c040','F':'#40b060','F#':'#40b0a0','G':'#40a0c0',
  'G#':'#4080d0','A':'#6060d0','A#':'#8050c0','B':'#a040a0'
};

function drawRoll(t){
  const w=canvas.offsetWidth,h=canvas.offsetHeight;
  ctx.clearRect(0,0,w,h);
  // Show notes in a 2-second window centered on current time
  const window=3;
  const tStart=t-0.5,tEnd=t+window;
  const minNote=24,maxNote=108;
  const noteRange=maxNote-minNote;

  for(const n of allNotes){
    if(n.t+n.d<tStart||n.t>tEnd)continue;
    const x=((n.t-tStart)/(tEnd-tStart))*w;
    const nw=Math.max(2,(n.d/(tEnd-tStart))*w);
    const y=h-((n.n-minNote)/noteRange)*h;
    const nh=Math.max(2,h/noteRange);
    const noteName=n.nm.replace(/\d/,'');
    const color=NOTE_COLORS[noteName]||'#888';
    const isNow=n.t<=t&&t<n.t+n.d;
    ctx.globalAlpha=isNow?1:0.4;
    ctx.fillStyle=color;
    ctx.fillRect(x,y-nh/2,nw,nh);
    if(isNow){
      ctx.fillStyle='#fff';
      ctx.globalAlpha=0.3;
      ctx.fillRect(x,y-nh/2-1,nw,nh+2);
    }
  }
  // Playhead line
  ctx.globalAlpha=0.6;
  ctx.strokeStyle='#fff';
  ctx.lineWidth=1;
  const px=(0.5/window)*w;
  ctx.beginPath();ctx.moveTo(px,0);ctx.lineTo(px,h);ctx.stroke();
  ctx.globalAlpha=1;
}

// Currently sounding notes display
function updateNoteNames(t){
  const sounding=[];
  for(const n of allNotes){
    if(n.t<=t&&t<n.t+n.d){
      sounding.push(n);
    }
    if(n.t>t+0.1)break;
  }
  // Group by register
  sounding.sort((a,b)=>a.n-b.n);
  let html='';
  for(const n of sounding){
    const cls=n.n>=72?'high':n.n>=48?'mid':'low';
    html+=`<span class="note-pill ${cls}">${n.nm}</span>`;
  }
  noteNamesEl.innerHTML=html||'<span style="color:#444;font-size:12px">---</span>';
}

// Build annotation cards
anns.forEach((a,i)=>{
  const [time,cls,text,... tags]=a;
  const card=document.createElement('div');
  card.className=`ann ${cls}`;
  card.id=`ann-${i}`;
  card.onclick=()=>{audio.currentTime=time;if(audio.paused)toggle()};
  card.innerHTML=`<div class="ann-time">${fmt(time)}</div><div class="ann-text">${text}</div>`+
    (tags.length?`<div class="ann-tags">${tags.map(t=>{const[c,...r]=t.split(' ');return`<span class="ann-tag ${c}">${r.join(' ')}</span>`}).join('')}</div>`:'');
  streamEl.appendChild(card);
});

let activeAnn=-1;
let animFrame;
function update(){
  const t=audio.currentTime,dur=audio.duration||489;
  progHead.style.left=(t/dur*100)+'%';
  timeEl.textContent=fmt(t)+' / '+fmt(dur);
  drawRoll(t);
  updateNoteNames(t);

  // Active annotation
  let idx=-1;
  for(let i=anns.length-1;i>=0;i--){if(t>=anns[i][0]){idx=i;break}}
  if(idx!==activeAnn){
    activeAnn=idx;
    document.querySelectorAll('.ann').forEach((c,i)=>{
      c.classList.remove('active','past');
      if(i===idx){c.classList.add('active');c.scrollIntoView({behavior:'smooth',block:'center'})}
      else if(i<idx)c.classList.add('past');
    });
  }
  animFrame=requestAnimationFrame(update);
}

audio.addEventListener('play',()=>{animFrame=requestAnimationFrame(update)});
audio.addEventListener('pause',()=>{cancelAnimationFrame(animFrame)});
audio.addEventListener('ended',()=>{playBtn.textContent='▶';cancelAnimationFrame(animFrame)});

// Initial draw
drawRoll(0);
</script>
