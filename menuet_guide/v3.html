<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古風なメヌエット ― 全曲リアルタイム解説</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Hiragino Kaku Gothic ProN',sans-serif;background:#08080c;color:#e0e0e0;overflow:hidden;display:flex;flex-direction:column}

.header{padding:16px 16px 8px;text-align:center;flex-shrink:0}
.composer{font-size:16px;color:#888;letter-spacing:4px;margin-bottom:2px}
.piece-title{font-size:36px;font-weight:bold;color:#f0f0f0;margin-bottom:2px}
.piece-sub{font-size:13px;color:#555;margin-bottom:10px}
.piece-desc{
  font-size:12px;color:#777;line-height:1.7;
  max-width:640px;margin:0 auto 8px;text-align:left;
}

.player-bar{flex-shrink:0;background:#101018;border-bottom:1px solid #1a1a24;padding:6px 12px}
.player-row{display:flex;align-items:center;gap:10px}
.play-btn{
  width:40px;height:40px;border-radius:50%;border:none;
  background:#e07040;color:#fff;font-size:16px;cursor:pointer;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
}
.play-btn:active{transform:scale(0.95)}
.time-display{flex:1;font-size:11px;color:#666;font-variant-numeric:tabular-nums}
.progress{height:20px;background:#16161e;border-radius:4px;position:relative;cursor:pointer;margin-top:4px;overflow:hidden}
.progress-sections{position:absolute;inset:0;display:flex;pointer-events:none}
.progress-sections div{height:100%;display:flex;align-items:center;justify-content:center;font-size:8px;color:rgba(255,255,255,0.4)}
.progress-head{position:absolute;top:0;left:0;width:2px;height:100%;background:#fff;box-shadow:0 0 4px #fff;pointer-events:none}

/* Piano roll - takes most of the screen */
.piano-roll{flex:1;background:#0c0c14;overflow:hidden;position:relative;min-height:200px}
.piano-roll canvas{display:block;width:100%;height:100%}

/* Pitch labels on left side of piano roll */
.pitch-labels{
  position:absolute;left:0;top:0;bottom:0;width:28px;
  pointer-events:none;z-index:2;
  background:linear-gradient(to right,rgba(12,12,20,0.85),transparent);
}

/* Bottom bar: section + annotation */
.bottom-bar{flex-shrink:0;background:#101018;border-top:1px solid #1a1a24;padding:8px 12px}
.section-indicator{font-size:11px;font-weight:bold;letter-spacing:1px;margin-bottom:4px}
.ann-text{font-size:14px;color:#ccc;line-height:1.6;height:2.8lh;overflow:hidden}

.sec-a{color:#e07040}
.sec-trio{color:#60c080}
.sec-a2{color:#40a0e0}
.sec-bridge{color:#e0c040}
.sec-coda{color:#b060e0}
</style>
</head>
<body>

<div class="header">
  <div class="composer">MAURICE RAVEL</div>
  <div class="piece-title">古風なメヌエット</div>
  <div class="piece-sub">Menuet antique (1895) ピアノ独奏</div>
  <div class="piece-desc">
    18世紀の宮廷舞曲「メヌエット」の形式を借りつつ、19世紀末の色彩的な和声で再解釈した作品。3拍子の堂々とした歩み、下降する3度音程の繰り返し、主題部と対照的な静かな中間部（トリオ）という構成。F#マイナー。約8分。
  </div>
</div>

<div class="player-bar">
  <div class="player-row">
    <button class="play-btn" id="playBtn" onclick="toggle()">▶</button>
    <div class="time-display" id="timeEl">0:00 / 8:09</div>
  </div>
  <div class="progress" id="prog" onclick="seek(event)">
    <div class="progress-sections">
      <div style="width:29.2%;background:rgba(224,112,64,0.15)">メヌエット主題</div>
      <div style="width:12%;background:rgba(96,192,128,0.15)">トリオ</div>
      <div style="width:24.7%;background:rgba(64,160,224,0.15)">主題再現</div>
      <div style="width:8.2%;background:rgba(224,192,64,0.15)">経過</div>
      <div style="width:25.9%;background:rgba(176,96,224,0.15)">コーダ</div>
    </div>
    <div class="progress-head" id="progHead"></div>
  </div>
</div>

<div class="piano-roll">
  <canvas id="rollCanvas"></canvas>
</div>

<audio id="audio" src="menuet_full.mp3" preload="auto"></audio>

<div class="bottom-bar">
  <div class="section-indicator" id="sectionName">A メヌエット主題</div>
  <div class="ann-text" id="annText">再生ボタンを押してください</div>
</div>

<script>
const audio=document.getElementById('audio'),playBtn=document.getElementById('playBtn'),
  timeEl=document.getElementById('timeEl'),progHead=document.getElementById('progHead'),
  sectionNameEl=document.getElementById('sectionName'),
  annText=document.getElementById('annText');

function toggle(){if(audio.paused){audio.play();playBtn.textContent='⏸'}else{audio.pause();playBtn.textContent='▶'}}
function seek(e){const r=document.getElementById('prog').getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*(audio.duration||489);if(audio.paused)toggle()}
function fmt(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0')}

let allNotes=[];
fetch('menuet_notes.json').then(r=>r.json()).then(d=>{allNotes=d});

const canvas=document.getElementById('rollCanvas'),ctx=canvas.getContext('2d');
function resizeCanvas(){
  const pr=window.devicePixelRatio||1;
  canvas.width=canvas.offsetWidth*pr;
  canvas.height=canvas.offsetHeight*pr;
  ctx.setTransform(pr,0,0,pr,0,0);
}
resizeCanvas();window.addEventListener('resize',resizeCanvas);

const NOTE_NAMES_ALL=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_COLORS={'C':'#e06060','C#':'#e08040','D':'#e0a030','D#':'#c0b030','E':'#80c040','F':'#40b060','F#':'#40b0a0','G':'#40a0c0','G#':'#4080d0','A':'#6060d0','A#':'#8050c0','B':'#a040a0'};

function drawRoll(t){
  const w=canvas.offsetWidth,h=canvas.offsetHeight;
  ctx.clearRect(0,0,w,h);

  // Draw subtle horizontal lines for octaves
  const minN=24,maxN=108,range=maxN-minN;
  for(let oct=2;oct<=8;oct++){
    const midiNote=oct*12;// C of that octave
    if(midiNote>=minN&&midiNote<=maxN){
      const y=h-((midiNote-minN)/range)*h;
      ctx.strokeStyle='rgba(255,255,255,0.06)';
      ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();
      // Octave label
      ctx.fillStyle='rgba(255,255,255,0.15)';
      ctx.font='9px sans-serif';
      ctx.fillText('C'+oct,2,y-2);
    }
  }

  const win=4,tStart=t-1,tEnd=t+win-1;

  // Playhead position
  const phPct=1/win;
  const phX=phPct*w;

  // Draw notes
  const nowNotes=[];
  for(const n of allNotes){
    if(n.t+n.d<tStart||n.t>tEnd)continue;
    const x=((n.t-tStart)/(tEnd-tStart))*w;
    const nw=Math.max(3,(n.d/(tEnd-tStart))*w);
    const y=h-((n.n-minN)/range)*h;
    const barH=Math.max(3,h/range*1.2);
    const nn=n.nm.replace(/\d+/,'');
    const c=NOTE_COLORS[nn]||'#888';
    const isNow=n.t<=t&&t<n.t+n.d;

    ctx.globalAlpha=isNow?1:0.35;
    ctx.fillStyle=c;

    // Rounded rect
    const r=1.5;
    ctx.beginPath();
    ctx.roundRect(x,y-barH/2,nw,barH,r);
    ctx.fill();

    if(isNow){
      // Glow
      ctx.fillStyle='rgba(255,255,255,0.15)';
      ctx.beginPath();
      ctx.roundRect(x-1,y-barH/2-1,nw+2,barH+2,r+1);
      ctx.fill();
      nowNotes.push(n);
    }
  }
  ctx.globalAlpha=1;

  // Draw note names on currently sounding notes
  ctx.font='bold 10px "SF Mono","Fira Code",monospace';
  ctx.textBaseline='middle';
  for(const n of nowNotes){
    const x=((n.t-tStart)/(tEnd-tStart))*w;
    const nw=Math.max(3,(n.d/(tEnd-tStart))*w);
    const y=h-((n.n-minN)/range)*h;
    const label=n.nm;
    const tw=ctx.measureText(label).width;
    // Position label to the right of the bar, or inside if wide enough
    const lx=nw>tw+6?x+3:x+nw+3;
    if(lx+tw<w){
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.fillRect(lx-1,y-6,tw+2,12);
      ctx.fillStyle='#fff';
      ctx.fillText(label,lx,y);
    }
  }

  // Playhead line
  ctx.strokeStyle='rgba(255,255,255,0.7)';
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(phX,0);ctx.lineTo(phX,h);ctx.stroke();
  // Subtle glow
  ctx.strokeStyle='rgba(255,255,255,0.15)';
  ctx.lineWidth=6;
  ctx.beginPath();ctx.moveTo(phX,0);ctx.lineTo(phX,h);ctx.stroke();
}

let activeIdx=-1;
let animFrame;

function update(){
  const t=audio.currentTime,dur=audio.duration||489;
  progHead.style.left=(t/dur*100)+'%';
  timeEl.textContent=fmt(t)+' / '+fmt(dur);
  drawRoll(t);

  let idx=-1;
  for(let i=anns.length-1;i>=0;i--){if(t>=anns[i][0]){idx=i;break}}
  if(idx!==activeIdx&&idx>=0){
    activeIdx=idx;
    const[,sec,text]=anns[idx];
    sectionNameEl.textContent=SEC_NAMES[sec]||'';
    sectionNameEl.className='section-indicator '+ sec;
    annText.textContent=text;
  }
  animFrame=requestAnimationFrame(update);
}

audio.addEventListener('play',()=>{animFrame=requestAnimationFrame(update)});
audio.addEventListener('pause',()=>{cancelAnimationFrame(animFrame)});
audio.addEventListener('ended',()=>{playBtn.textContent='▶';cancelAnimationFrame(animFrame)});
drawRoll(0);
</script>
